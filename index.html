<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字卡牌大亂鬥 - Word Arena</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 自定義動畫 */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideInUp 0.4s ease-out forwards; }
        .animate-slide-down { animation: slideInDown 0.4s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.3s ease-out forwards; }
        
        /* 隱藏捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans selection:bg-indigo-500/30 min-h-screen relative pb-20">

    <!-- 全域載入畫面 (升級防卡死機制) -->
    <div id="global-loading" class="fixed inset-0 bg-[#0f172a] z-[100] flex flex-col items-center justify-center gap-4 transition-opacity duration-300">
        <div id="loading-spinner-container" class="relative">
            <i id="loading-spinner" class="fas fa-spinner fa-spin text-6xl text-indigo-500"></i>
        </div>
        <p id="loading-text" class="text-xl font-bold tracking-wider mt-4">正在連線至伺服器...</p>
        <p id="loading-subtext" class="text-sm text-slate-400 max-w-xs text-center hidden"></p>
        <button id="force-start-btn" class="hidden mt-6 px-6 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-full font-bold shadow-lg transition-transform hover:scale-105 active:scale-95 flex items-center gap-2">
            <i class="fas fa-sign-in-alt"></i> 強制進入 (單機模式)
        </button>
    </div>

    <!-- 頂部導航 -->
    <header class="bg-[#1e293b] p-4 border-b border-slate-700/50 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-black flex items-center gap-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
            <i class="fas fa-layer-group text-indigo-400"></i> 單字大亂鬥 Word Arena
        </h1>
        <div class="text-xs text-slate-300">
            目前收集卡牌: <span id="total-cards-count" class="font-bold text-white text-sm">0</span> 張
        </div>
    </header>

    <!-- 主視圖區塊 -->
    <main class="max-w-4xl mx-auto p-4 relative w-full h-full min-h-[calc(100vh-140px)]">
        
        <!-- 視圖 1: 猜單字 (Hangman) -->
        <div id="view-hangman" class="animate-fade-in w-full">
            <div id="hangman-container" class="flex flex-col items-center justify-center max-w-lg mx-auto w-full">
                <!-- 內容由 JS 渲染 -->
            </div>
        </div>

        <!-- 視圖 2: 卡牌庫 (Library) -->
        <div id="view-library" class="hidden animate-fade-in w-full">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-slate-100"><i class="fas fa-book-open text-indigo-400"></i> 卡牌庫</h2>
            <div id="library-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 justify-items-center pb-8">
                <!-- 卡牌由 JS 渲染 -->
            </div>
        </div>

        <!-- 視圖 3: 競技場 (Arena) -->
        <div id="view-arena" class="hidden animate-fade-in w-full">
            <div id="arena-container" class="w-full">
                <!-- 內容由 JS 渲染 -->
            </div>
        </div>

    </main>

    <!-- 底部導航 -->
    <nav class="fixed bottom-0 w-full bg-[#1e293b] border-t border-slate-700/50 flex justify-around p-2 z-50 pb-safe">
        <button id="tab-hangman" onclick="switchTab('hangman')" class="tab-btn active text-indigo-400 relative flex flex-col items-center justify-center w-full py-2 transition-colors">
            <i class="fas fa-gamepad text-2xl mb-1"></i>
            <span class="text-xs font-medium">猜單字</span>
        </button>
        <button id="tab-library" onclick="switchTab('library')" class="tab-btn text-slate-400 hover:text-slate-200 relative flex flex-col items-center justify-center w-full py-2 transition-colors">
            <i class="fas fa-book-open text-2xl mb-1"></i>
            <span class="text-xs font-medium">卡牌庫</span>
            <span id="badge-library" class="hidden absolute top-1 right-1/4 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow-md animate-bounce">0</span>
        </button>
        <button id="tab-arena" onclick="switchTab('arena')" class="tab-btn text-slate-600 cursor-not-allowed relative flex flex-col items-center justify-center w-full py-2 transition-colors" disabled>
            <i class="fas fa-lock text-2xl mb-1" id="arena-icon"></i>
            <span class="text-xs font-medium" id="arena-label">競技場(需4張)</span>
        </button>
    </nav>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 1. 全域狀態與防卡死機制 ---
        let app, auth, db, appId;
        
        const State = {
            user: null,
            isOfflineMode: false,
            cards: [],
            activeTab: 'hangman',
            hangman: { status: 'loading', word: '', guessed: [], mistakes: 0, maxMistakes: 6, newCard: null, details: null },
            arena: { view: 'deck_select', selectedDeck: [], rooms: [], matchId: null, matchData: null, unsubscribeMatchList: null }
        };

        const uiElements = {
            loadingContainer: document.getElementById('global-loading'),
            loadingText: document.getElementById('loading-text'),
            loadingSubtext: document.getElementById('loading-subtext'),
            loadingSpinner: document.getElementById('loading-spinner'),
            forceBtn: document.getElementById('force-start-btn')
        };

        // 8秒後顯示強制進入按鈕 (防卡死)
        let initTimeout = setTimeout(() => {
            if (!State.user && !State.isOfflineMode) {
                uiElements.loadingSpinner.className = "fas fa-wifi text-6xl text-yellow-500 animate-pulse";
                uiElements.loadingText.innerText = "連線似乎受到阻擋";
                uiElements.loadingText.className = "text-xl font-bold mt-4 text-yellow-400";
                uiElements.loadingSubtext.innerText = "可能受阻擋廣告套件影響，或是缺少伺服器環境。您可以先進入單機模式遊玩！";
                uiElements.loadingSubtext.classList.remove('hidden');
                uiElements.forceBtn.classList.remove('hidden');
            }
        }, 8000);

        uiElements.forceBtn.onclick = () => {
            clearTimeout(initTimeout);
            enableOfflineMode("已切換為單機模式。您的卡牌將儲存於瀏覽器中，但無法進行多人連線對戰。");
        };

        function enableOfflineMode(msg) {
            State.isOfflineMode = true;
            uiElements.loadingContainer.classList.add('opacity-0');
            setTimeout(() => uiElements.loadingContainer.classList.add('hidden'), 300);
            
            State.user = { uid: 'local_user' };
            
            // 讀取 LocalStorage 卡牌
            try {
                const localCards = JSON.parse(localStorage.getItem('wordArenaCards') || '[]');
                State.cards = localCards;
            } catch(e) { State.cards = []; }
            
            if(msg) alert(msg);
            updateUI();
            initHangmanGame();
        }

        // --- 2. 初始化 Firebase ---
        async function initApp() {
            try {
                let configObj = {};
                // 防錯處理：檢查設定檔是否存在且格式正確
                if (typeof __firebase_config !== 'undefined') {
                    configObj = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
                }
                
                if (!configObj || Object.keys(configObj).length === 0) {
                    throw new Error("無效的 Firebase 設定檔");
                }

                appId = typeof __app_id !== 'undefined' ? __app_id : 'hangman-card-battler';
                app = initializeApp(configObj);
                auth = getAuth(app);
                db = getFirestore(app);

                // 登入
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 綁定狀態監聽
                onAuthStateChanged(auth, (user) => {
                    if (user && !State.isOfflineMode) {
                        clearTimeout(initTimeout);
                        State.user = user;
                        uiElements.loadingContainer.classList.add('opacity-0');
                        setTimeout(() => uiElements.loadingContainer.classList.add('hidden'), 300);
                        
                        // 監聽雲端卡牌
                        const cardsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'cards');
                        onSnapshot(cardsRef, (snapshot) => {
                            const loadedCards = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            loadedCards.sort((a, b) => b.createdAt - a.createdAt);
                            State.cards = loadedCards;
                            updateUI();
                            if (State.activeTab === 'library') renderLibrary();
                            if (State.activeTab === 'arena' && State.arena.view === 'deck_select') renderArena();
                        }, (err) => {
                            console.error("Firestore Error:", err);
                        });

                        initHangmanGame();
                    }
                });

            } catch (err) {
                console.error("Firebase Init Error:", err);
                clearTimeout(initTimeout);
                uiElements.loadingSpinner.className = "fas fa-exclamation-triangle text-6xl text-red-500";
                uiElements.loadingText.innerText = "無法連接伺服器";
                uiElements.loadingText.className = "text-xl font-bold mt-4 text-red-400";
                uiElements.loadingSubtext.innerText = err.message;
                uiElements.loadingSubtext.classList.remove('hidden');
                uiElements.forceBtn.classList.remove('hidden');
            }
        }

        // --- 3. 核心翻譯 ---
        async function fetchWordDetails(word) {
            let translation = "未知";
            let isRare = false;
            let cefr = "A1";

            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|zh-TW`);
                const data = await res.json();
                if (data && data.responseData && data.responseData.translatedText) {
                    translation = data.responseData.translatedText;
                    if (translation.toLowerCase() === word.toLowerCase() || translation.includes("MYMEMORY")) {
                        translation = "稀有詞彙(無翻譯)";
                        isRare = true;
                    }
                } else { isRare = true; }
            } catch (e) {
                translation = "稀有詞彙(無翻譯)";
                isRare = true;
            }

            if (isRare) cefr = "???";
            else {
                const l = word.length;
                if (l <= 4) cefr = "A1"; else if (l === 5) cefr = "A2"; else if (l === 6) cefr = "B1"; else if (l === 7) cefr = "B2"; else if (l === 8) cefr = "C1"; else cefr = "C2";
            }
            return { translation, isRare, cefr };
        }

        // --- 4. 產生卡牌 HTML ---
        window.generateCardHTML = function(card, hideDetails = false) {
            if (hideDetails) {
                return `<div class="bg-[#1e293b] border border-slate-600 rounded-xl p-4 w-full h-full min-h-[200px] flex items-center justify-center shadow-lg relative overflow-hidden aspect-[3/4]">
                    <div class="absolute inset-0 bg-gradient-to-br from-indigo-900/30 to-slate-800"></div>
                    <i class="fas fa-lock text-slate-500 relative z-10 text-3xl"></i>
                </div>`;
            }

            const rarityColors = {
                1: 'border-slate-500 from-slate-700 to-slate-800 text-slate-400',
                2: 'border-emerald-600 from-emerald-900 to-[#0f172a] text-emerald-400',
                3: 'border-blue-500 from-blue-900 to-[#0f172a] text-blue-400',
                4: 'border-purple-500 from-purple-900 to-[#0f172a] text-purple-400',
                5: 'border-yellow-500 from-yellow-900/80 to-[#1e293b] text-yellow-400 shadow-[0_0_15px_rgba(234,179,8,0.2)]'
            };
            const theme = rarityColors[card.stars] || rarityColors[1];

            let starsHTML = '';
            for(let i=0; i<5; i++) {
                starsHTML += `<i class="fas fa-star text-[12px] ${i < card.stars ? 'text-yellow-400 drop-shadow-md' : 'text-slate-600/50'}"></i>`;
            }

            return `
            <div class="relative bg-gradient-to-br ${theme} border-2 rounded-xl p-4 w-full aspect-[3/4] flex flex-col items-center shadow-xl overflow-hidden shrink-0">
                <!-- 星星 -->
                <div class="flex gap-1 mt-1 mb-2">${starsHTML}</div>
                
                <!-- 單字 -->
                <h3 class="font-bold tracking-wider text-white text-center break-words w-full px-1 uppercase my-auto drop-shadow-md ${card.word.length > 8 ? 'text-2xl' : 'text-3xl'}">
                    ${card.word}
                </h3>
                
                <!-- 翻譯 -->
                <div class="text-center w-full mt-auto mb-4 flex flex-col items-center">
                    <p class="text-sm text-slate-300 line-clamp-2 px-1 font-medium">${card.translation}</p>
                </div>

                <!-- 戰鬥數值 -->
                <div class="bg-[#0f172a]/80 w-full rounded-lg p-2 flex justify-between items-center text-base font-bold backdrop-blur-sm border border-white/5 mt-auto shadow-inner">
                    <div class="flex items-center gap-1 text-rose-400"><i class="fas fa-heart text-sm"></i> ${card.hp}</div>
                    <div class="flex items-center gap-1 text-indigo-300"><i class="fas fa-khanda text-sm"></i> ${card.atk}</div>
                </div>
            </div>`;
        }

        // --- 5. UI 更新 ---
        window.switchTab = function(tabId) {
            if(tabId === 'arena' && State.cards.length < 4) return;
            
            State.activeTab = tabId;
            ['hangman', 'library', 'arena'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                const btn = document.getElementById(`tab-${t}`);
                btn.classList.remove('text-indigo-400', 'active');
                if(t !== 'arena' || State.cards.length >= 4) btn.classList.add('text-slate-400');
            });
            
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.remove('text-slate-400');
            document.getElementById(`tab-${tabId}`).classList.add('text-indigo-400', 'active');

            if (tabId === 'library') renderLibrary();
            if (tabId === 'arena') renderArena();
        };

        function updateUI() {
            document.getElementById('total-cards-count').innerText = State.cards.length;
            
            const arenaBtn = document.getElementById('tab-arena');
            const arenaIcon = document.getElementById('arena-icon');
            const arenaLabel = document.getElementById('arena-label');
            
            if (State.cards.length >= 4) {
                arenaBtn.disabled = false;
                arenaBtn.classList.remove('text-slate-600', 'cursor-not-allowed');
                if(State.activeTab !== 'arena') arenaBtn.classList.add('text-slate-400');
                arenaIcon.className = 'fas fa-swords text-2xl mb-1 text-purple-400';
                arenaLabel.innerText = '競技場';
                if(State.isOfflineMode) arenaLabel.innerText = '競技場(離線)';
            }

            const unseenCount = State.cards.filter(c => c.isNew).length;
            const badge = document.getElementById('badge-library');
            if (unseenCount > 0 && State.activeTab !== 'library') {
                badge.innerText = unseenCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // --- 6. 遊戲邏輯 (還原截圖UI) ---
        window.initHangmanGame = async function() {
            State.hangman.status = 'loading';
            State.hangman.guessed = [];
            State.hangman.mistakes = 0;
            State.hangman.newCard = null;
            State.hangman.details = null;
            renderHangman();

            try {
                let newWord = "";
                if(Math.random() > 0.4) {
                    const topics = ["animals", "technology", "sports", "food", "nature", "science"];
                    const topic = topics[Math.floor(Math.random() * topics.length)];
                    const res = await fetch(`https://api.datamuse.com/words?ml=${topic}&max=50`);
                    const data = await res.json();
                    const valid = data.filter(d => d.word.length >= 4 && d.word.length <= 8 && /^[a-zA-Z]+$/.test(d.word));
                    newWord = valid[Math.floor(Math.random() * valid.length)].word.toUpperCase();
                } else {
                    const len = Math.floor(Math.random() * 5) + 4;
                    const res = await fetch(`https://random-word-api.herokuapp.com/word?length=${len}`);
                    const data = await res.json();
                    newWord = data[0].toUpperCase();
                }
                State.hangman.word = newWord;
                State.hangman.status = 'playing';
                renderHangman();
            } catch (err) {
                State.hangman.word = 'ARENA';
                State.hangman.status = 'playing';
                renderHangman();
            }
        }

        window.handleGuess = function(letter) {
            if (State.activeTab !== 'hangman' || State.hangman.status !== 'playing' || State.hangman.guessed.includes(letter)) return;
            
            State.hangman.guessed.push(letter);
            
            if (!State.hangman.word.includes(letter)) {
                State.hangman.mistakes++;
                if (State.hangman.mistakes >= State.hangman.maxMistakes) {
                    handleHangmanOver('lost');
                    return;
                }
            } else {
                const isWon = State.hangman.word.split('').every(char => State.hangman.guessed.includes(char));
                if (isWon) {
                    handleHangmanOver('won');
                    return;
                }
            }
            renderHangman();
        }

        async function handleHangmanOver(result) {
            State.hangman.status = 'saving';
            renderHangman();
            
            const word = State.hangman.word.toLowerCase();
            const details = await fetchWordDetails(word);
            State.hangman.details = details;
            
            const length = word.length;
            const hp = length * 18 + Math.floor(Math.random() * 60) + 100;
            const atk = length * 12 + Math.floor(Math.random() * 40) + 50;
            const stars = details.isRare ? 5 : Math.min(5, Math.max(1, Math.floor(length / 2)));
            
            const cardData = {
                word: State.hangman.word, translation: details.translation, cefr: details.cefr,
                hp, atk, stars, isRare: details.isRare,
                createdAt: Date.now(), isNew: true
            };

            State.hangman.newCard = cardData;

            if (result === 'won') {
                if (!State.isOfflineMode && State.user) {
                    try {
                        const cardsRef = collection(db, 'artifacts', appId, 'users', State.user.uid, 'cards');
                        await addDoc(cardsRef, cardData);
                    } catch (e) { console.error("Firestore Save Error:", e); }
                } else {
                    cardData.id = Date.now().toString();
                    State.cards.push(cardData);
                    localStorage.setItem('wordArenaCards', JSON.stringify(State.cards));
                    updateUI();
                }
            }
            
            State.hangman.status = result;
            renderHangman();
        }

        function renderHangman() {
            const container = document.getElementById('hangman-container');
            const hs = State.hangman;

            if (hs.status === 'loading' || hs.status === 'saving') {
                container.innerHTML = `
                    <div class="flex flex-col items-center my-20 animate-fade-in">
                        <i class="fas fa-spinner fa-spin text-indigo-500 mb-4 text-5xl"></i>
                        <p class="text-indigo-300 font-bold">${hs.status === 'saving' ? '正在解析詞彙與計算能力值...' : '尋找下一個單字...'}</p>
                    </div>`;
                return;
            }

            if (hs.status === 'playing') {
                let hangmanSVG = `
                    <div class="h-40 w-40 relative border-l-4 border-b-4 border-slate-600 mb-2 mx-auto">
                        <div class="absolute top-0 left-0 w-20 border-t-4 border-slate-600"></div>
                        <div class="absolute top-0 left-20 h-8 border-l-4 border-slate-600"></div>
                        ${hs.mistakes > 0 ? `<div class="absolute top-8 left-[68px] w-8 h-8 rounded-full border-4 border-rose-400"></div>` : ''}
                        ${hs.mistakes > 1 ? `<div class="absolute top-16 left-[82px] h-12 border-l-4 border-slate-300"></div>` : ''}
                        ${hs.mistakes > 2 ? `<div class="absolute top-20 left-12 w-8 border-t-4 border-slate-300 -rotate-45"></div>` : ''}
                        ${hs.mistakes > 3 ? `<div class="absolute top-20 left-24 w-8 border-t-4 border-slate-300 rotate-45"></div>` : ''}
                        ${hs.mistakes > 4 ? `<div class="absolute top-28 left-14 w-8 border-t-4 border-slate-300 rotate-45"></div>` : ''}
                        ${hs.mistakes > 5 ? `<div class="absolute top-28 left-22 w-8 border-t-4 border-slate-300 -rotate-45"></div>` : ''}
                    </div>`;

                let wordHTML = hs.word.split('').map(char => {
                    const isGuessed = hs.guessed.includes(char);
                    return `<span class="text-3xl sm:text-4xl font-black border-b-4 w-10 sm:w-12 inline-block text-center pb-1 mx-1 ${isGuessed ? 'border-indigo-400 text-white' : 'border-slate-600 text-transparent'}">${isGuessed ? char : '_'}</span>`;
                }).join('');

                let keysHTML = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(char => {
                    const isUsed = hs.guessed.includes(char);
                    return `
                    <button onclick="handleGuess('${char}')" ${isUsed ? 'disabled' : ''}
                        class="py-3 rounded-xl font-bold text-lg sm:text-xl transition-all ${isUsed ? 'bg-[#1e293b] text-slate-600 cursor-not-allowed border border-slate-800' : 'bg-[#1e293b] hover:bg-indigo-600 border border-slate-600 text-white shadow-md active:scale-95'}">
                        ${char}
                    </button>`;
                }).join('');

                container.innerHTML = `
                    <div class="w-full flex flex-col items-center animate-fade-in px-2">
                        <div class="mb-6 w-full flex flex-col items-center">
                            ${hangmanSVG}
                            <div class="text-rose-400 font-bold bg-rose-900/20 px-4 py-1.5 rounded-full border border-rose-900 mt-2 text-sm">
                                剩餘生命: ${hs.maxMistakes - hs.mistakes}
                            </div>
                        </div>
                        <div class="mb-10 text-center flex flex-wrap justify-center gap-y-6">
                            ${wordHTML}
                        </div>
                        <div class="grid grid-cols-7 gap-1.5 sm:gap-2 w-full max-w-lg mb-4">
                            ${keysHTML}
                        </div>
                    </div>`;
                return;
            }

            // 完美還原截圖的結算畫面排版
            if (hs.status === 'won' || hs.status === 'lost') {
                const isWon = hs.status === 'won';
                
                let titleHTML = isWon 
                    ? `<h2 class="text-3xl font-black mb-1 text-emerald-400 flex items-center justify-center gap-2">🎉 挑戰成功！</h2>
                       <p class="text-emerald-300 text-sm mb-6">你獲得了一張新卡牌！</p>`
                    : `<h2 class="text-3xl font-black mb-1 text-rose-500 flex items-center justify-center gap-2">💀 遊戲結束</h2>
                       <p class="text-slate-400 text-sm mb-6">小人被吊死了，下次再接再厲！</p>`;

                let cardOrContentHTML = '';
                if (isWon && hs.newCard) {
                    cardOrContentHTML = `<div class="w-full max-w-[240px] mb-8 animate-slide-up">${generateCardHTML(hs.newCard)}</div>`;
                } else if (!isWon) {
                    cardOrContentHTML = `
                        <div class="bg-[#e8f5e9] text-slate-800 rounded-2xl p-6 w-full max-w-sm mb-8 border border-emerald-200 text-center animate-zoom-in shadow-lg">
                            <p class="text-emerald-700 font-bold text-sm mb-2">答案單字：</p>
                            <p class="text-4xl font-black tracking-widest text-[#1e293b] mb-4">${hs.word}</p>
                            <div class="h-px w-full bg-emerald-200 mb-4"></div>
                            <p class="text-emerald-700 font-bold text-sm mb-1">中文解釋：</p>
                            <p class="text-slate-600 font-medium">${hs.details ? (hs.details.isRare ? '(這是一個非常罕見的單字，翻譯字庫未收錄)' : hs.details.translation) : ''}</p>
                        </div>
                    `;
                }

                container.innerHTML = `
                    <div class="flex flex-col items-center w-full animate-fade-in mt-4">
                        ${titleHTML}
                        ${cardOrContentHTML}
                        <button onclick="initHangmanGame()" class="bg-[#5c4dff] hover:bg-[#4b3ce0] text-white font-bold py-4 px-12 rounded-full shadow-lg flex items-center justify-center gap-2 transition-transform hover:scale-105 active:scale-95 text-lg w-full max-w-sm">
                            再猜一次 <kbd class="hidden sm:inline-block ml-1 text-xs bg-black/20 px-2 py-0.5 rounded border border-white/20 font-mono">Enter</kbd>
                        </button>
                    </div>`;
            }
        }

        // --- 7. Library ---
        function renderLibrary() {
            const container = document.getElementById('library-container');
            
            if (!State.isOfflineMode) {
                State.cards.forEach(card => {
                    if(card.isNew && State.user) {
                        const cardRef = doc(db, 'artifacts', appId, 'users', State.user.uid, 'cards', card.id);
                        updateDoc(cardRef, { isNew: false }).catch(()=>{});
                    }
                });
            } else {
                let updated = false;
                State.cards.forEach(c => { if(c.isNew){ c.isNew = false; updated = true; }});
                if(updated) localStorage.setItem('wordArenaCards', JSON.stringify(State.cards));
            }
            updateUI(); 

            if (State.cards.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-slate-500 py-20 w-full">目前沒有卡牌。快去猜單字收集吧！</div>`;
                return;
            }

            container.innerHTML = State.cards.map(card => `
                <div class="w-full max-w-[180px] transform transition-transform hover:scale-105 hover:-translate-y-2 cursor-pointer relative group">
                    ${card.isNew ? '<span class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full z-20 shadow">New</span>' : ''}
                    ${generateCardHTML(card)}
                </div>
            `).join('');
        }

        // --- 8. Arena ---
        window.toggleCardSelection = function(cardId) {
            const card = State.cards.find(c => c.id === cardId);
            const existsIdx = State.arena.selectedDeck.findIndex(c => c.id === cardId);
            if (existsIdx >= 0) State.arena.selectedDeck.splice(existsIdx, 1);
            else if (State.arena.selectedDeck.length < 4) State.arena.selectedDeck.push(card);
            renderArena();
        }

        window.setArenaView = function(view) {
            if(State.isOfflineMode) {
                alert("目前為單機模式，無法進入多人連線大廳！(如欲連線請重新整理並確保網路與伺服器環境正常)");
                return;
            }
            State.arena.view = view;
            
            if (view === 'lobby' && !State.arena.unsubscribeMatchList && db) {
                const matchesRef = collection(db, 'artifacts', appId, 'public', 'data', 'matches');
                State.arena.unsubscribeMatchList = onSnapshot(matchesRef, (snapshot) => {
                    const allMatches = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    State.arena.rooms = allMatches.filter(m => m.status === 'waiting' && m.player1 !== State.user.uid);
                    
                    if (State.arena.matchId) {
                        const myMatch = allMatches.find(m => m.id === State.arena.matchId);
                        if (myMatch) {
                            State.arena.matchData = myMatch;
                            if (myMatch.status === 'playing') State.arena.view = 'room';
                            if (myMatch.player1 === State.user.uid && myMatch.status === 'playing') {
                                if (myMatch.p1State.ready && myMatch.p2State.ready && !myMatch.resolving) {
                                    resolveRound(myMatch.id, myMatch);
                                }
                            }
                        } else {
                            State.arena.matchId = null; State.arena.matchData = null; State.arena.view = 'lobby';
                        }
                    }
                    if(State.activeTab === 'arena') renderArena();
                });
            }
            renderArena();
        }

        // Arena 戰鬥結算邏輯
        async function resolveRound(id, match) {
            const matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', id);
            await updateDoc(matchRef, { resolving: true });
            
            const p1Card = match.p1State.team[match.p1State.currentCardIndex];
            const p2Card = match.p2State.team[match.p2State.currentCardIndex];
            let p1Dmg = p1Card.atk; let p2Dmg = p2Card.atk;
            if (p1Card.isRare) p2Dmg = 0; if (p2Card.isRare) p1Dmg = 0;
            const p1Remain = p1Card.hp - p2Dmg; const p2Remain = p2Card.hp - p1Dmg;
            let p1Wins = match.p1State.wins; let p2Wins = match.p2State.wins;
            
            if (p1Remain > p2Remain) p1Wins++; else if (p2Remain > p1Remain) p2Wins++;
            const nextRound = match.round + 1; const isGameOver = nextRound > 3;

            setTimeout(async () => {
                await updateDoc(matchRef, {
                    status: isGameOver ? 'finished' : 'playing', round: nextRound, resolving: false,
                    'p1State.wins': p1Wins, 'p2State.wins': p2Wins, 'p1State.ready': false, 'p2State.ready': false,
                    'p1State.usedCards': [...match.p1State.usedCards, match.p1State.currentCardIndex],
                    'p2State.usedCards': [...match.p2State.usedCards, match.p2State.currentCardIndex],
                    'p1State.currentCardIndex': null, 'p2State.currentCardIndex': null,
                    lastResult: { round: match.round, p1Card, p2Card, p1Dmg, p2Dmg, p1Remain, p2Remain }
                });
            }, 3500);
        }

        window.createRoom = async function() {
            if(State.isOfflineMode) return;
            const matchesRef = collection(db, 'artifacts', appId, 'public', 'data', 'matches');
            const newDoc = await addDoc(matchesRef, {
                status: 'waiting', player1: State.user.uid, p1Name: '玩家 ' + State.user.uid.slice(-4),
                p1State: { team: State.arena.selectedDeck, currentCardIndex: null, wins: 0, ready: false, usedCards: [] },
                round: 1, resolving: false, createdAt: Date.now()
            });
            State.arena.matchId = newDoc.id; State.arena.view = 'room'; renderArena();
        }

        window.joinRoom = async function(roomId) {
            const matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', roomId);
            await updateDoc(matchRef, {
                status: 'playing', player2: State.user.uid, p2Name: '玩家 ' + State.user.uid.slice(-4),
                p2State: { team: State.arena.selectedDeck, currentCardIndex: null, wins: 0, ready: false, usedCards: [] }
            });
            State.arena.matchId = roomId; State.arena.view = 'room'; renderArena();
        }

        window.leaveRoom = async function() {
            if (State.arena.matchId && State.arena.matchData && State.arena.matchData.player1 === State.user.uid && State.arena.matchData.status === 'waiting') {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', State.arena.matchId));
            }
            State.arena.matchId = null; State.arena.matchData = null; State.arena.view = 'lobby'; renderArena();
        }

        window.playArenaCard = async function(index) {
            if(!State.arena.matchId || !State.arena.matchData || State.isOfflineMode) return;
            const isPlayer1 = State.arena.matchData.player1 === State.user.uid;
            const matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', State.arena.matchId);
            if(isPlayer1) await updateDoc(matchRef, { 'p1State.currentCardIndex': index, 'p1State.ready': true });
            else await updateDoc(matchRef, { 'p2State.currentCardIndex': index, 'p2State.ready': true });
        }

        function renderArena() {
            const container = document.getElementById('arena-container');
            const view = State.arena.view;

            if (view === 'deck_select') {
                const deckHTML = State.arena.selectedDeck.map(card => `
                    <div class="relative scale-75 origin-top -mx-4 cursor-pointer hover:-translate-y-2 transition-transform shrink-0" onclick="toggleCardSelection('${card.id}')">
                        <div class="absolute -top-2 -right-2 bg-rose-500 rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold z-20 shadow-md border-2 border-[#0f172a]"><i class="fas fa-times"></i></div>
                        ${generateCardHTML(card)}
                    </div>
                `).join('');

                const cardsHTML = State.cards.map(card => {
                    const isSelected = State.arena.selectedDeck.find(c => c.id === card.id);
                    return `
                    <div onclick="toggleCardSelection('${card.id}')" class="cursor-pointer transition-all ${isSelected ? 'ring-4 ring-indigo-500 scale-95 opacity-50 rounded-xl' : 'hover:scale-105'}">
                        ${generateCardHTML(card)}
                    </div>`;
                }).join('');

                container.innerHTML = `
                <div class="animate-fade-in pb-10 w-full">
                    <h2 class="text-2xl font-black text-center mb-2 text-indigo-400">⚔️ 組建牌組</h2>
                    <p class="text-slate-400 text-sm text-center mb-6">點擊下方卡牌選擇 <strong class="text-white text-lg">${State.arena.selectedDeck.length}/4</strong> 張，進入三戰兩勝對決！</p>
                    
                    <div class="flex justify-center gap-2 mb-6 min-h-[160px] p-4 bg-[#1e293b] rounded-2xl border border-slate-700 w-full overflow-x-auto shadow-inner no-scrollbar items-start">
                        ${State.arena.selectedDeck.length === 0 ? '<div class="text-slate-500 my-auto flex flex-col items-center"><i class="fas fa-hand-pointer text-2xl mb-2"></i>點擊下方卡牌加入</div>' : deckHTML}
                    </div>

                    <button onclick="setArenaView('lobby')" ${State.arena.selectedDeck.length !== 4 ? 'disabled' : ''} class="w-full py-4 rounded-xl font-bold text-lg shadow-lg transition-all flex justify-center items-center gap-2 mb-8 ${State.arena.selectedDeck.length === 4 ? 'bg-[#5c4dff] hover:bg-[#4b3ce0] text-white active:scale-95' : 'bg-slate-800 text-slate-600 border border-slate-700 cursor-not-allowed'}">
                        <i class="fas fa-sign-in-alt text-xl"></i> 進入對戰大廳 ${State.isOfflineMode ? '(單機模式不可用)' : ''}
                    </button>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">${cardsHTML}</div>
                </div>`;
                return;
            }

            if (view === 'lobby') {
                const roomsHTML = State.arena.rooms.length === 0 
                    ? `<div class="text-center text-slate-500 py-12 bg-[#1e293b]/50 rounded-2xl border border-slate-700 border-dashed">目前沒有玩家開房，自己創建一個吧！</div>`
                    : State.arena.rooms.map(room => `
                        <div class="bg-[#1e293b] border border-slate-600 p-4 rounded-xl flex justify-between items-center hover:bg-slate-700 transition-colors shadow-md">
                            <div class="flex items-center gap-3">
                                <div class="bg-[#0f172a] p-2.5 rounded-full"><i class="fas fa-spinner fa-spin text-indigo-400"></i></div>
                                <span class="font-bold text-lg">${room.p1Name} <span class="text-slate-400 text-sm font-normal">的擂台</span></span>
                            </div>
                            <button onclick="joinRoom('${room.id}')" class="bg-emerald-600 hover:bg-emerald-500 px-5 py-2.5 rounded-lg font-bold shadow-md">
                                加入
                            </button>
                        </div>
                    `).join('');

                container.innerHTML = `
                <div class="animate-fade-in w-full max-w-lg mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-indigo-400"><i class="fas fa-globe"></i> 對戰大廳</h2>
                        <button onclick="setArenaView('deck_select')" class="text-sm text-slate-400 bg-slate-800 px-3 py-1 rounded-full hover:bg-slate-700">重新選牌</button>
                    </div>
                    <button onclick="createRoom()" class="w-full bg-[#5c4dff] hover:bg-[#4b3ce0] text-white font-bold py-4 rounded-xl mb-8 flex justify-center items-center gap-2 shadow-lg shadow-indigo-900/30 active:scale-95 transition-transform">
                        <i class="fas fa-plus-circle text-xl"></i> 創建我的房間
                    </button>
                    <h3 class="text-slate-400 font-bold mb-4 flex items-center gap-2 border-b border-slate-700/50 pb-2">可加入的房間</h3>
                    <div class="space-y-3">${roomsHTML}</div>
                </div>`;
                return;
            }

            if (view === 'room') {
                const match = State.arena.matchData;
                if (!match) return;

                if (match.status === 'waiting') {
                    container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 animate-fade-in text-center">
                        <div class="relative mb-8">
                            <i class="fas fa-circle-notch fa-spin text-[#5c4dff] text-7xl"></i>
                        </div>
                        <h2 class="text-2xl font-black mb-2 text-white">等待對手加入...</h2>
                        <p class="text-slate-400 mb-10">你的擂台已經準備好了</p>
                        <button onclick="leaveRoom()" class="px-8 py-3 border border-rose-500/50 text-rose-400 font-bold rounded-full hover:bg-rose-900/20 transition-colors">
                            取消並離開
                        </button>
                    </div>`;
                    return;
                }

                // 戰鬥畫面渲染
                const isP1 = match.player1 === State.user.uid;
                const mySt = isP1 ? match.p1State : match.p2State;
                const opSt = isP1 ? match.p2State : match.p1State;
                const res = match.resolving;
                const fin = match.status === 'finished';

                let opCardHTML = '';
                if (res && match.lastResult) {
                    const dmg = isP1 ? match.lastResult.p2Dmg : match.lastResult.p1Dmg;
                    opCardHTML = `<div class="animate-slide-down relative">${generateCardHTML(isP1 ? match.lastResult.p2Card : match.lastResult.p1Card)}<div class="absolute -bottom-4 right-0 bg-rose-600 text-white font-black px-3 py-1 rounded-lg text-xl rotate-12 shadow-lg border border-white z-20">-${dmg}</div></div>`;
                } else if (opSt.ready) opCardHTML = `<div class="animate-slide-down">${generateCardHTML({}, true)}</div>`;
                else opCardHTML = `<div class="w-full max-w-[200px] aspect-[3/4] border border-dashed border-slate-600 rounded-xl flex flex-col items-center justify-center text-slate-500 bg-[#1e293b]/50"><i class="fas fa-ellipsis-h animate-pulse text-2xl mb-2"></i>對手思考中</div>`;

                let myCardHTML = '';
                if (res && match.lastResult) {
                    const dmg = isP1 ? match.lastResult.p1Dmg : match.lastResult.p2Dmg;
                    myCardHTML = `<div class="animate-slide-up relative">${generateCardHTML(isP1 ? match.lastResult.p1Card : match.lastResult.p2Card)}<div class="absolute -top-4 right-0 bg-rose-600 text-white font-black px-3 py-1 rounded-lg text-xl -rotate-12 shadow-lg border border-white z-20">-${dmg}</div></div>`;
                } else if (mySt.ready) myCardHTML = `<div class="animate-slide-up">${generateCardHTML(mySt.team[mySt.currentCardIndex])}</div>`;
                else myCardHTML = `<div class="w-full max-w-[200px] aspect-[3/4] border-2 border-dashed border-indigo-500/50 rounded-xl flex items-center justify-center text-indigo-400 bg-indigo-900/10 font-bold">請從下方出牌</div>`;

                let handHTML = '';
                if (!fin) {
                    handHTML = `
                        <div class="w-full mt-4 transition-opacity duration-300 ${mySt.ready || res ? 'opacity-50 pointer-events-none' : 'opacity-100'} pb-6">
                            <p class="text-center font-bold text-slate-300 mb-3 text-sm">${mySt.ready ? '等待交鋒...' : '點擊選擇出戰卡牌'}</p>
                            <div class="flex justify-center gap-2 overflow-x-auto px-2 no-scrollbar min-h-[140px] items-end">
                                ${mySt.team.map((card, idx) => {
                                    const used = mySt.usedCards.includes(idx);
                                    return `
                                    <div onclick="!${used} && !${mySt.ready} && playArenaCard(${idx})"
                                         class="transform transition-all w-[100px] shrink-0
                                            ${used ? 'opacity-20 grayscale cursor-not-allowed scale-90' : 'cursor-pointer hover:-translate-y-4 hover:scale-105'}
                                            ${mySt.currentCardIndex === idx ? 'ring-4 ring-indigo-500 -translate-y-4 rounded-xl' : ''}">
                                        <div class="scale-[0.55] origin-bottom -mx-8 -mb-16 pointer-events-none">${generateCardHTML(card)}</div>
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>`;
                }

                container.innerHTML = `
                <div class="flex flex-col h-full items-center w-full max-w-lg mx-auto animate-fade-in relative">
                    <!-- 計分板 -->
                    <div class="w-full flex justify-between items-center mb-4 bg-[#1e293b] p-3 rounded-2xl border border-slate-700 shadow-md">
                        <div class="flex items-center gap-3 w-1/3">
                            <div class="bg-blue-500/20 text-blue-400 p-2 rounded-lg text-xl font-black border border-blue-500/30 w-12 text-center">${mySt.wins}</div>
                            <span class="text-sm font-bold text-slate-300">我方</span>
                        </div>
                        <div class="text-center w-1/3">
                            <span class="text-xs text-slate-500 font-bold uppercase tracking-widest">Round</span>
                            <div class="text-xl font-black text-white">${Math.min(match.round, 3)}/3</div>
                        </div>
                        <div class="flex items-center justify-end gap-3 w-1/3">
                            <span class="text-sm font-bold text-slate-300">對手</span>
                            <div class="bg-rose-500/20 text-rose-400 p-2 rounded-lg text-xl font-black border border-rose-500/30 w-12 text-center">${opSt.wins}</div>
                        </div>
                    </div>

                    <!-- 戰鬥區 -->
                    <div class="w-full flex flex-col justify-between items-center relative py-8 my-2 bg-gradient-to-b from-[#1e293b] to-[#0f172a] rounded-3xl border border-slate-700/50 overflow-hidden shadow-2xl min-h-[420px]">
                        <div class="w-full flex justify-center transform scale-[0.85] absolute top-2">${opCardHTML}</div>
                        <div class="z-10 flex items-center justify-center bg-[#0f172a] rounded-full p-4 border border-slate-600 shadow-lg relative my-auto">
                            <i class="fas fa-bolt text-2xl text-yellow-400"></i>
                        </div>
                        <div class="w-full flex justify-center transform scale-[0.85] absolute bottom-2">${myCardHTML}</div>
                    </div>

                    ${fin ? `
                        <div class="w-full bg-[#1e293b] border border-indigo-500/50 rounded-2xl p-6 text-center animate-zoom-in shadow-xl mt-4">
                            <h2 class="text-3xl font-black mb-6 ${mySt.wins > opSt.wins ? 'text-emerald-400' : 'text-slate-400'}">
                                ${mySt.wins > opSt.wins ? '🎉 勝利！' : mySt.wins < opSt.wins ? '💀 敗北' : '🤝 平手'}
                            </h2>
                            <button onclick="leaveRoom()" class="bg-[#5c4dff] hover:bg-[#4b3ce0] text-white font-bold py-3 px-10 rounded-full shadow-md w-full">返回大廳</button>
                        </div>
                    ` : handHTML}
                </div>`;
            }
        }

        // --- 9. 全域鍵盤監聽 ---
        document.addEventListener('keydown', (e) => {
            if (State.activeTab !== 'hangman') return;
            if (State.hangman.status === 'playing' && /^[a-zA-Z]$/.test(e.key)) {
                handleGuess(e.key.toUpperCase());
            } else if ((State.hangman.status === 'won' || State.hangman.status === 'lost') && e.key === 'Enter') {
                initHangmanGame();
            }
        });

        // 啟動
        initApp();
    </script>
</body>
</html>
