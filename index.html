<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>單字大亂鬥 · Word Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{
  --bg:#09090f;--bg2:#11111d;--bg3:#1a1a2e;
  --border:#2a2a45;--accent:#7c6aff;--accent2:#ff6ab0;
  --text:#e8e8f8;--muted:#6b6b9a;--danger:#ff4d6d;--ok:#00d68f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);
     display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
.ko{font-family:'Black Han Sans',sans-serif}
.scr{overflow-y:auto;overflow-x:hidden}
.scr::-webkit-scrollbar{width:3px}
.scr::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* ── layout ── */
#hdr{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);
     padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100}
#main{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;display:none;flex-direction:column}
.view.on{display:flex}
#nav{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:10px 4px 8px;gap:3px;border:none;background:none;color:var(--muted);
    font-size:10px;cursor:pointer;font-family:inherit;transition:color .2s;position:relative}
.nb.on{color:var(--accent)}
.nb.lk{opacity:.3;cursor:not-allowed}
.nbadge{position:absolute;top:5px;right:calc(50% - 22px);background:var(--danger);
        color:#fff;font-size:9px;font-weight:900;width:15px;height:15px;border-radius:50%;
        display:none;align-items:center;justify-content:center}

/* ── toast ── */
#twrap{position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:9999;
       display:flex;flex-direction:column;gap:6px;width:min(92vw,340px);pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border);padding:10px 16px;
       border-radius:999px;font-size:13px;font-weight:700;
       display:flex;align-items:center;gap:8px;
       animation:tIn .3s ease;box-shadow:0 8px 24px #0009}
@keyframes tIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* ── cards ── */
.ci{width:100%;height:100%;display:flex;flex-direction:column;padding:8px 7px 7px;
    background:var(--bg2);border:2px solid var(--border);border-radius:14px;
    position:relative;overflow:hidden}
.ci::before{content:'';position:absolute;inset:0;
            background:radial-gradient(ellipse at 50% 0%,var(--cg,transparent) 0%,transparent 70%);
            pointer-events:none}
.cstars{display:flex;gap:2px;justify-content:center;margin-bottom:4px}
.cword{font-family:'Black Han Sans',sans-serif;text-align:center;letter-spacing:2px;
       color:#fff;flex:1;display:flex;align-items:center;justify-content:center;
       line-height:1.1;text-shadow:0 2px 14px var(--cg,transparent)}
.ctr{font-size:10px;text-align:center;color:var(--muted);margin-bottom:3px;line-height:1.3;
     overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.cchip{font-size:8px;font-weight:900;letter-spacing:1px;padding:1px 5px;border-radius:999px;
       border:1px solid;align-self:center;margin-bottom:5px}
.cstats{display:flex;justify-content:space-between;background:#ffffff08;border-radius:7px;
        padding:4px 7px;font-size:11px;font-weight:800;border:1px solid #ffffff08}
.shp{color:#ff6b6b}.satk{color:#74b9ff}
.s1{--cg:#94a3b828;border-color:#94a3b842!important}
.s2{--cg:#4ade8035;border-color:#4ade8050!important}
.s3{--cg:#60a5fa38;border-color:#60a5fa52!important}
.s4{--cg:#a78bfa48;border-color:#a78bfa60!important}
.s5{--cg:#fb923c58;border-color:#fb923c6a!important}
.s6{--cg:#facc1565;border-color:#facc1578!important;box-shadow:0 0 20px #facc1518}

#hm-inner{
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(10px,2vh,24px) clamp(12px,4vw,48px) 16px;
  overflow-y:auto;flex:1;gap:clamp(8px,1.5vh,16px);
}
#hm-status{
  font-size:clamp(12px,1.8vw,16px);
  color:var(--muted);letter-spacing:1px;font-weight:700;
}
/* 單一置中欄，所有內容在這裡堆疊 */
#hm-center{
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(8px,1.5vh,18px);
  width:100%;max-width:min(640px,96vw);
}
/* hm-left/right 變成透明 passthrough */
#hm-left,#hm-right{
  display:contents;
}
/* 絞刑台 */
#gallows{
  display:flex;align-items:center;justify-content:center;
  width:clamp(140px,30vw,300px);
}
#gallows svg{
  width:100%!important;height:auto!important;
}
/* 字母格 */
#wdisp{
  display:flex;gap:clamp(5px,1.2vw,14px);
  flex-wrap:wrap;justify-content:center;width:100%;
}
.lslot{
  width:clamp(30px,5vw,62px);
  height:clamp(38px,6.5vw,78px);
  border-bottom:clamp(2px,.35vw,4px) solid var(--muted);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:clamp(2px,.5vw,7px);
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(17px,3.5vw,44px);
  color:#fff;transition:border-color .2s;
}
.lslot.rev{border-color:var(--accent)}
/* 鍵盤 — 7欄 grid 撐滿 hm-center 欄寬 */
#kb{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:clamp(5px,.9vw,10px);
  width:100%;
}
.key{
  aspect-ratio:1;
  border-radius:clamp(6px,1vw,14px);
  border:1px solid var(--border);
  background:var(--bg3);color:var(--text);
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(13px,2.2vw,26px);
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;padding:0;
}
.key:active{transform:scale(.88)}
.key.hit{background:var(--accent);border-color:var(--accent);color:#fff}
.key.miss{background:var(--bg2);border-color:#222233;color:var(--muted);cursor:default;opacity:.4}

/* ── result overlay ── */
#roverlay{
  position:absolute;inset:0;z-index:50;background:var(--bg);display:none;
  flex-direction:column;align-items:center;overflow-y:auto;
  padding:clamp(12px,2vh,24px) clamp(12px,3vw,24px) 88px;
}
#roverlay.on{display:flex}
#roverlay>#rcontent{width:100%;max-width:min(520px,96vw)}

/* ── library ── */
#libgrid{
  flex:1;overflow-y:auto;
  padding:clamp(8px,1.5vw,16px);
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(clamp(100px,18vw,160px),1fr));
  gap:clamp(7px,1.5vw,14px);
  align-content:start;
}
.cw{aspect-ratio:3/4;border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s}
.cw:hover{transform:translateY(-4px)}

/* ── modal ── */
#mbg{position:fixed;inset:0;z-index:200;background:#000c;backdrop-filter:blur(8px);
     display:none;align-items:center;justify-content:center}
#mbg.on{display:flex}
#mbox{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:clamp(16px,3vw,24px);
  width:min(96vw,520px);max-height:90vh;overflow-y:auto;
  padding:clamp(14px,2.5vw,24px);
  animation:zIn .3s cubic-bezier(.22,.68,0,1.2);
}
@keyframes zIn{from{transform:scale(.92);opacity:0}to{transform:none;opacity:1}}
.dsec{background:var(--bg3);border-radius:12px;padding:clamp(10px,1.8vw,16px);margin-bottom:10px;border:1px solid var(--border)}
.dlbl{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
.ptag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;
      background:#7c6aff25;color:var(--accent);border:1px solid #7c6aff40;margin-bottom:5px}
.ddef{font-size:clamp(12px,1.8vw,14px);color:var(--text);line-height:1.65;margin-bottom:2px}
.dzh{font-size:clamp(11px,1.6vw,13px);color:var(--muted);margin-bottom:2px}
.dex{font-size:clamp(11px,1.6vw,13px);color:var(--muted);font-style:italic;margin-top:2px;
     padding-left:8px;border-left:2px solid var(--border)}

/* ── arena ── */
#arena-inner{flex:1;overflow-y:auto;padding:clamp(10px,2vw,20px) clamp(12px,3vw,28px) 16px}
#arena-inner>*{max-width:min(640px,100%);margin-left:auto;margin-right:auto}
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
       padding:clamp(14px,2.5vw,22px);display:flex;align-items:center;gap:14px;cursor:pointer;
       transition:all .2s;margin-bottom:10px}
.mcard:hover{border-color:var(--accent);background:var(--bg3)}
.mico{width:clamp(44px,6vw,56px);height:clamp(44px,6vw,56px);border-radius:14px;
      display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dslot{background:var(--bg3);border:2px dashed var(--border);border-radius:12px;
       aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.hand-row{display:flex;gap:clamp(6px,1.2vw,12px);overflow-x:auto;padding:5px 2px}
.hand-row::-webkit-scrollbar{display:none}
.hcard{width:clamp(68px,10vw,100px);flex-shrink:0;cursor:pointer;transition:transform .2s}
.hcard:hover{transform:translateY(-6px)}
.hcard.used{opacity:.22;cursor:not-allowed}
.hcard.sel{transform:translateY(-10px);outline:3px solid var(--accent);border-radius:14px}
.rinput{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
        padding:clamp(10px,1.8vw,14px) 16px;
        font-size:clamp(18px,3vw,24px);font-family:'Black Han Sans',sans-serif;
        letter-spacing:6px;color:#fff;width:100%;text-align:center;text-transform:uppercase}
.rinput:focus{outline:none;border-color:var(--accent)}
.rcode{font-family:'Black Han Sans',sans-serif;font-size:clamp(28px,5vw,40px);letter-spacing:10px;
       color:var(--accent);text-align:center;padding:10px}

/* ── buttons ── */
.btn{border:none;border-radius:12px;
     padding:clamp(10px,1.8vw,14px) clamp(14px,2.5vw,22px);
     font-size:clamp(13px,1.8vw,15px);
     font-family:inherit;font-weight:700;cursor:pointer;transition:all .2s;
     display:flex;align-items:center;justify-content:center;gap:7px}
.btn:active{transform:scale(.95)}
.btnp{background:var(--accent);color:#fff}
.btnp:hover{filter:brightness(1.12)}
.btns{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* ── nav responsive ── */
#nav{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:clamp(8px,1.5vw,12px) 4px;gap:3px;border:none;background:none;color:var(--muted);
    font-size:clamp(9px,1.4vw,12px);cursor:pointer;font-family:inherit;transition:color .2s;position:relative}
.nb.on{color:var(--accent)}
.nb.lk{opacity:.3;cursor:not-allowed}
.nb svg{width:clamp(18px,3vw,26px);height:clamp(18px,3vw,26px)}
.nbadge{position:absolute;top:5px;right:calc(50% - 22px);background:var(--danger);
        color:#fff;font-size:9px;font-weight:900;width:15px;height:15px;border-radius:50%;
        display:none;align-items:center;justify-content:center}

/* ── header responsive ── */
#hdr{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);
     padding:clamp(8px,1.5vw,12px) clamp(12px,2.5vw,24px);
     display:flex;align-items:center;justify-content:space-between;z-index:100}

/* ── misc ── */
.dvd{height:1px;background:var(--border);margin:10px 0}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;border:1px solid}
@keyframes cdrop{from{transform:translateY(-36px) rotate(-4deg);opacity:0}to{transform:none;opacity:1}}
.cdrop{animation:cdrop .5s cubic-bezier(.22,.68,0,1.2) forwards}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.splash{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;
        flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .4s}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
@keyframes cardFlip{from{transform:rotateY(90deg) scale(.8);opacity:0}to{transform:none;opacity:1}}
@keyframes dmgPop{0%{transform:scale(0) translateY(4px);opacity:0}60%{transform:scale(1.3) translateY(-2px)}100%{transform:none;opacity:1}}
</style>
</head>
<body>

<!-- Splash -->
<div class="splash" id="splash">
  <div class="ko" style="font-size:44px;background:linear-gradient(135deg,#7c6aff,#ff6ab0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px">WORD ARENA</div>
  <div style="color:var(--muted);font-size:13px">單字卡牌對戰</div>
  <div style="margin-top:20px;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px">
    <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7c6aff" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    初始化中…
  </div>
</div>

<!-- Header -->
<div id="hdr">
  <div class="ko" style="font-size:18px;background:linear-gradient(135deg,#7c6aff,#ff6ab0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px">WORD ARENA</div>
  <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)">
    卡牌
    <span id="hcount" style="font-weight:900;color:#fff;background:var(--bg3);padding:2px 10px;border-radius:999px;border:1px solid var(--border)">0</span>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- HANGMAN -->
  <div class="view on" id="view-hangman">
    <div id="hm-inner">
      <div id="hm-status"></div>
      <div id="hm-center">
        <div id="hm-left">
          <div id="gallows"></div>
        </div>
        <div id="hm-right">
          <div id="wdisp"></div>
          <div id="hint" style="font-size:11px;color:var(--muted);min-height:14px"></div>
          <div id="kb"></div>
        </div>
      </div>
    </div>
    <div id="roverlay"><div id="rcontent" style="width:100%;max-width:min(520px,96vw)"></div></div>
  </div>

  <!-- LIBRARY -->
  <div class="view" id="view-library">
    <div style="padding:10px 14px 6px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <span style="font-weight:800;font-size:15px">卡牌庫</span>
      <span style="font-size:11px;color:var(--muted)">點擊卡牌查看字義</span>
    </div>
    <div id="libgrid"></div>
  </div>

  <!-- ARENA -->
  <div class="view" id="view-arena">
    <div style="padding:10px 14px 6px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <span style="font-weight:800;font-size:15px">競技場</span>
      <button class="btn btns" style="font-size:11px;padding:5px 10px" onclick="aBack()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </button>
    </div>
    <div id="arena-inner" class="scr"></div>
  </div>
</div>

<!-- Nav -->
<div id="nav">
  <button class="nb on" id="nb-hangman" onclick="goTab('hangman')">
    <!-- skull SVG -->
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7.03 2 3 6.03 3 11c0 2.97 1.4 5.62 3.59 7.33V20a1 1 0 001 1h8.82a1 1 0 001-1v-1.67C19.6 16.62 21 13.97 21 11c0-4.97-4.03-9-9-9zm-2.5 14.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm5 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>
    猜單字
  </button>
  <button class="nb lk" id="nb-library" onclick="goTab('library')">
    <!-- layers SVG -->
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
    卡牌庫
    <span class="nbadge" id="nbadge">0</span>
  </button>
  <button class="nb lk" id="nb-arena" onclick="goTab('arena')">
    <!-- swords SVG -->
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"/><path d="M13 19l6-6 2 2-6 6z"/><path d="M3 21l4-4"/><path d="M5 11L19 5l-6 14-3-5z" style="display:none"/></svg>
    競技場
  </button>
</div>

<!-- Card Modal -->
<div id="mbg" onclick="cModal()">
  <div id="mbox" onclick="event.stopPropagation()"><div id="mcontent"></div></div>
</div>

<!-- Toast container -->
<div id="twrap"></div>

<script>
'use strict';

// ════════════════════════════════
// SVG ICON HELPERS (inline, no CDN)
// ════════════════════════════════
const ICO = {
  spin: `<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`,
  check: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  info:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  warn:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  book:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>`,
  globe: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`,

  const el=document.createElement('div');
  const ico = type==='error' ? ICO.warn : type==='ok' ? ICO.check : ICO.info;
  const col = type==='error' ? '#ff4d6d' : type==='ok' ? '#00d68f' : '#7c6aff';

  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2800);
}

// WORD SOURCE — 累積擴展難度
// ════════════════════════════════
const TOPICS = ['animal','technology','science','space','ocean','history','medicine',
  'music','food','sports','geography','art','nature','architecture','philosophy',
  'psychology','law','biology','chemistry','weather','literature','economy','politics'];

// 概念：難度是「機率分佈的擴展」，不是「切換」
// 卡片越多，高字長的機率權重越高，但低字長永遠保留一定份額
//
// 用卡數 n 動態計算每個字長的權重：
//   base weight 固定給每個長度，bonus weight 隨卡數成長
//
// 字長 4: 一直有 20% 基礎份額（永遠保留）
// 字長 5: 一直有 18% 基礎份額
// 字長 6: 基礎 16% + 隨卡數輕微增加
// 字長 7-11: 基礎很低，但隨卡數顯著增加
function calcLengthWeights(){
  const n = S.cards.length;
  // 卡數影響係數 0~1（0張=0, 30張以上=1.0）
  const t = Math.min(1, n / 30);

  // [字長, 基礎權重, 隨t增加的額外權重]
  const spec = [
    [4,  20,  0 ],  // 短字永遠保留，不因難度消失
    [5,  18,  0 ],
    [6,  16,  4 ],
    [7,  12,  10],
    [8,   8,  16],
    [9,   4,  14],
    [10,  2,  10],
    [11,  1,   6],
  ];

  return spec.map(([l, base, bonus]) => ({ l, w: base + bonus * t }));
}

function pickWeightedLength(){
  const weights = calcLengthWeights();
  const total = weights.reduce((s,x)=>s+x.w, 0);
  let r = Math.random() * total;
  for(const {l,w} of weights){ r-=w; if(r<=0) return l; }
  return weights[weights.length-1].l;
}

// 已收集單字集合（全小寫），用於去重
function getOwnedWords(){
  return new Set(S.cards.map(c=>(c.wordLower||c.word.toLowerCase())));
}

async function getRandWord(){
  const targetLen = pickWeightedLength();
  const owned = getOwnedWords();
  const MAX_TRIES = 3; // 最多試幾次去重

  for(let attempt=0; attempt<MAX_TRIES; attempt++){
    let candidate = '';

    // 70% datamuse
    if(Math.random() < 0.7){
      try{
        const t = TOPICS[~~(Math.random()*TOPICS.length)];
        const mode = Math.random()<.5 ? 'ml' : 'rel_trg';
        const r = await fetch(
          `https://api.datamuse.com/words?${mode}=${t}&max=200`,
          {signal:AbortSignal.timeout(5000)}
        );
        const d = await r.json();
        // 過濾：字母only、長度範圍、未擁有
        const exact = d.filter(x => /^[a-z]+$/.test(x.word)
          && x.word.length===targetLen && !owned.has(x.word));
        const near  = d.filter(x => /^[a-z]+$/.test(x.word)
          && Math.abs(x.word.length-targetLen)<=1
          && x.word.length>=4 && x.word.length<=11
          && !owned.has(x.word));
        const pool = exact.length ? exact : near;
        if(pool.length){
          candidate = pool[~~(Math.random()*Math.min(pool.length,60))].word;
        }
      }catch(e){}
    }

    // 30% random-word-api（或 datamuse 失敗時）
    if(!candidate){
      try{
        const len = targetLen + (attempt>0 ? (Math.random()<.5?1:-1) : 0);
        const safeLen = Math.max(4, Math.min(11, len));
        const r = await fetch(
          `https://random-word-api.herokuapp.com/word?length=${safeLen}`,
          {signal:AbortSignal.timeout(5000)}
        );
        const d = await r.json();
        if(d?.[0] && !owned.has(d[0])) candidate = d[0];
      }catch(e){}
    }

    if(candidate && !owned.has(candidate)) return candidate;
    // 如果抽到重複字，繼續下一次嘗試（換不同字長）
  }

  // 備援池（也過濾已擁有）
  const allFallbacks = [
    'fish','lake','farm','city','bird','rain','moon','wind','book','fold','myth','lamp','frog','drum',
    'brave','storm','flame','proud','crown','frost','magic','night','globe','swift','grace','pearl',
    'science','freedom','courage','ancient','mystery','harvest','witness','shelter','current','balance',
    'ephemeral','labyrinth','melancholy','wanderlust','serendipity','eloquence','soliloquy','resilience',
  ];
  const fresh = allFallbacks.filter(w=>!owned.has(w));
  if(fresh.length) return fresh[~~(Math.random()*fresh.length)];
  // 全都有了（不太可能），隨便給一個
  return allFallbacks[~~(Math.random()*allFallbacks.length)];
}

// Safe fetch with timeout, returns null on failure
async function sfetch(url, ms=6000){
  try{
    const r = await fetch(url, {signal:AbortSignal.timeout(ms)});
    if(!r.ok) return null;
    return r;
  }catch(e){ return null; }
}

async function getDictData(word){
  // Free Dictionary API
  const r = await sfetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
  if(!r) return null;
  try{
    const d = await r.json();
    if(!d?.[0]) return null;
    return {
      phonetic: d[0].phonetic || d[0].phonetics?.find(p=>p.text)?.text || '',
      meanings: d[0].meanings.map(m=>({
        partOfSpeech: m.partOfSpeech,
        definitions: m.definitions.slice(0,3).map(dd=>({def:dd.definition||'',example:dd.example||'',zh:''}))
      }))
    };
  }catch(e){ return null; }
}

async function getCEFR(word){
  const w = word.toLowerCase();

  // 1. 本地對照表（最快、最準確）
  if(CEFR_DB[w]) return CEFR_DB[w];

  // 2. 牛津學習者字典（Oxford Learner's Dictionaries）HTML 爬蟲
  try{
    const r = await sfetch(
      `https://www.oxfordlearnersdictionaries.com/definition/english/${encodeURIComponent(w)}`,
      6000
    );
    if(r){
      const html = await r.text();
      // Oxford 格式：<div class="symbols">/span class="cefr"> B2 </span>
      const m = html.match(/class="[^"]*cefr[^"]*"[^>]*>\s*([ABC][12])\s*</i)
             || html.match(/CEFR[^:]*:\s*([ABC][12])/i)
             || html.match(/>\s*([ABC][12])\s*<\/span>/i);
      if(m){
        const level = m[1].toUpperCase();
        if(CEFR_LIST.includes(level)){
          CEFR_DB[w] = level; // 快取進本地表
          return level;
        }
      }
    }
  }catch(e){}

  // 3. Cambridge Learner's Dictionary HTML 爬蟲（備援）
  try{
    const r = await sfetch(
      `https://dictionary.cambridge.org/dictionary/learner-english/${encodeURIComponent(w)}`,
      6000
    );
    if(r){
      const html = await r.text();
      const m = html.match(/class="epp-xref[^"]*"[^>]*>\s*([ABC][12])\s*</i)
             || html.match(/>\s*([ABC][12])\s*<\/span>/i)
             || html.match(/data-level="([ABC][12])"/i);
      if(m){
        const level = m[1].toUpperCase();
        if(CEFR_LIST.includes(level)){
          CEFR_DB[w] = level;
          return level;
        }
      }
    }
  }catch(e){}

  return null;
}

// 清理翻譯結果 — 去除雜訊，回傳乾淨中文
function cleanTr(t, orig){
  if(!t) return '';
  t = t.trim();
  // 拒絕：只回傳原字、MYMEMORY錯誤、純英文、過長
  if(t.toUpperCase().includes('MYMEMORY')) return '';
  if(t.toLowerCase() === orig.toLowerCase()) return '';
  if(/^[a-zA-Z\s]+$/.test(t)) return ''; // 全英文沒翻到
  return t.split(/[,，;；(（\n]/)[0].trim().slice(0, 18);
}

async function getTranslation(text){
  const orig = text.toLowerCase().trim();

  // 1. 內建詞庫（最快最可靠）
  if(ZH_DICT[orig]) return ZH_DICT[orig];

  // 2. MyMemory
  try{
    const r = await sfetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0,200))}&langpair=en|zh-TW`, 6000);
    if(r){
      const d = await r.json();
      const t = cleanTr(d?.responseData?.translatedText, orig);
      if(t) return t;
      // 也試試 matches[0]
      const m0 = d?.matches?.[0]?.translation;
      if(m0){ const t2=cleanTr(m0,orig); if(t2) return t2; }
    }
  }catch(e){}

  // 3. Google Translate 非官方端點（通常可用）
  try{
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(text.slice(0,200))}`;
    const r = await sfetch(url, 6000);
    if(r){
      const d = await r.json();
      const t = cleanTr(d?.[0]?.[0]?.[0], orig);
      if(t) return t;
    }
  }catch(e){}

  // 4. Wikipedia 中文標題（對專有名詞很好）
  try{
    const r = await sfetch(`https://zh.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(orig)}&redirects=1&format=json&origin=*`, 4000);
    if(r){
      const d = await r.json();
      const pages = d?.query?.pages;
      const id = pages ? Object.keys(pages)[0] : '-1';
      if(id!=='-1' && pages[id]?.title && pages[id].title.toLowerCase()!==orig){
        return pages[id].title.slice(0,16);
      }
    }
  }catch(e){}

  return ''; // 真的查不到
}

async function getWiki(word){
  // Try Chinese Wikipedia first
  try{
    const r = await sfetch(`https://zh.wikipedia.org/w/api.php?action=query&prop=extracts&exsentences=3&explaintext=1&titles=${encodeURIComponent(word)}&redirects=1&format=json&origin=*`, 5000);
    if(r){
      const d = await r.json();
      const pages = d?.query?.pages;
      const id = pages ? Object.keys(pages)[0] : '-1';
      if(id!=='-1' && pages[id]?.extract && pages[id].extract.length > 20){
        return { title: pages[id].title, extract: pages[id].extract, lang:'zh' };
      }
    }
  }catch(e){}

  // Fallback: English Wikipedia
  try{
    const r = await sfetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exsentences=4&explaintext=1&titles=${encodeURIComponent(word)}&redirects=1&format=json&origin=*`, 5000);
    if(r){
      const d = await r.json();
      const pages = d?.query?.pages;
      const id = pages ? Object.keys(pages)[0] : '-1';
      if(id!=='-1' && pages[id]?.extract && pages[id].extract.length > 20){
        return { title: pages[id].title, extract: pages[id].extract, lang:'en' };
      }
    }
  }catch(e){}

  return null;
}

// Master word-data fetch — ALL APIs run in parallel
async function fetchWordData(word){
  const w = word.toLowerCase();
  const res = { word:w, phonetic:'', cefr:null, meanings:[], translation:'', explanation:'', isRare:false };

  // Run dict, CEFR, word-translation all at once
  const [dictResult, cefrResult, trResult] = await Promise.allSettled([
    getDictData(w),
    getCEFR(w),
    getTranslation(w),
  ]);

  // Apply dict
  if(dictResult.status==='fulfilled' && dictResult.value){
    res.phonetic  = dictResult.value.phonetic;
    res.meanings  = dictResult.value.meanings;
  }

  // Apply CEFR
  if(cefrResult.status==='fulfilled' && cefrResult.value){
    res.cefr = cefrResult.value;
  }

  // Apply translation (only if it's genuinely Chinese)
  if(trResult.status==='fulfilled' && trResult.value){
    res.translation = trResult.value;
  }

  // Wikipedia: always try for explanation — critical for words not in Free Dictionary
  // Run in parallel with the already-collected data
  const wikiResult = await getWiki(w);

  if(!res.meanings.length){
    res.isRare = true;
    if(wikiResult){
      res.explanation = wikiResult.extract;
      const wikiTitle = wikiResult.title;
      if(wikiTitle && wikiTitle.toLowerCase() !== w && /[\u4e00-\u9fff]/.test(wikiTitle)){
        if(!res.translation) res.translation = wikiTitle.slice(0,16);
      }
    }
  } else {
    // Even when we have dict data, add wiki as supplemental explanation
    if(wikiResult && !res.explanation){
      // Only use if it looks informative (not just a stub)
      if(wikiResult.extract && wikiResult.extract.length > 50){
        res.explanation = (wikiResult.lang==='zh' ? '' : '【Wikipedia】') + wikiResult.extract;
      }
    }
  }

  // Still no translation? Try translating the first English definition
  if(!res.translation && res.meanings.length){
    const firstDef = res.meanings[0]?.definitions[0]?.def || '';
    if(firstDef) res.translation = await getTranslation(firstDef);
  }

  // Still nothing? Try translating the word itself one more time via Google
  if(!res.translation){
    try{
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(w)}`;
      const r = await sfetch(url, 5000);
      if(r){ const d=await r.json(); const t=cleanTr(d?.[0]?.[0]?.[0],w); if(t) res.translation=t; }
    }catch(e){}
  }

  // Translate first definition to Chinese for the card modal detail view
  if(res.meanings[0]?.definitions[0] && !res.meanings[0].definitions[0].zh){
    const defTr = await getTranslation(res.meanings[0].definitions[0].def.slice(0,180));
    if(defTr) res.meanings[0].definitions[0].zh = defTr;
  }

  // Also translate 2nd and 3rd meanings in background (non-blocking)
  res.meanings.slice(1,3).forEach(async m => {
    if(m.definitions[0] && !m.definitions[0].zh){
      const t = await getTranslation(m.definitions[0].def.slice(0,160));
      if(t) m.definitions[0].zh = t;
    }
  });

  // Build explanation from meanings if still empty
  if(!res.explanation && res.meanings.length){
    res.explanation = res.meanings.map(m=>`【${m.partOfSpeech}】${m.definitions[0]?.def||''}`).join('\n');
  }

  // Last-resort fallback for translation — use POS label, never show bare English word
  if(!res.translation){
    const posMap = {noun:'名詞',verb:'動詞',adjective:'形容詞',adverb:'副詞',
                    pronoun:'代名詞',conjunction:'連接詞',preposition:'介系詞',exclamation:'感嘆詞'};
    const pos = res.meanings[0]?.partOfSpeech;
    // Try to extract a key concept from the first definition
    const firstDef = res.meanings[0]?.definitions[0]?.def || '';
    const shortDef = firstDef.replace(/\(.*?\)/g,'').trim().split(/[,;.]/)[0].trim();
    res.translation = pos ? `[${posMap[pos]||pos}]` : (shortDef.slice(0,20) || w);
  }
  if(!res.cefr) res.cefr = res.isRare ? 'C2' : estCEFR(w);

  return res;
}

// ════════════════════════════════
// BUILD CARD
// ════════════════════════════════
function buildCard(wd, mistakes, maxM, hintPenalty=0){
  const stars  = c2s(wd.cefr);
  const wlen   = wd.word.length;
  const acc    = Math.max(0, 1 - mistakes/maxM);      // 0..1，錯越少越高
  const defC   = wd.meanings.reduce((s,m)=>s+m.definitions.length,0) || 1;
  const posC   = wd.meanings.length || 1;

  // 短字加成（≤5字母 → 顯著加成，因為格子少很難猜）
  const shortBonus = wlen <= 4 ? 0.80
                   : wlen === 5 ? 0.50
                   : wlen === 6 ? 0.20
                   : 0;

  const baseHP  = 80 + stars*28 + defC*14 + posC*10;
  const baseATK = 45 + stars*22 + defC*9  + posC*6;
  const accBonus = Math.round(acc * 70);
  const shortMult = 1 + shortBonus;
  // 提示扣減（0=沒用提示, 0.3=用了類型, 0.45=類型+字母, ...）
  const hintMult = Math.max(0.1, 1 - hintPenalty);

  const hp  = Math.round((baseHP  + accBonus) * shortMult * hintMult) + ~~(Math.random()*20);
  const atk = Math.round((baseATK + accBonus) * shortMult * hintMult) + ~~(Math.random()*15);
  const dispStars = shortBonus > 0 ? Math.max(stars, 2) : stars;

  return {
    id:`${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
    word:wd.word.toUpperCase(), wordLower:wd.word,
    phonetic:wd.phonetic, cefr:wd.cefr, stars:dispStars,
    translation:wd.translation, explanation:wd.explanation,
    meanings:wd.meanings, isRare:wd.isRare,
    shortWord: shortBonus > 0,   // 標記短字，卡牌庫可顯示特殊標籤
    hp, atk,
    isNew:true, createdAt:Date.now()
  };
}

// 語義分類標籤
const CATEGORY_TAGS = {
  // 詞性類
  animal:   '🐾 動物類',  plant:    '🌿 植物類',  food:     '🍎 食物類',
  body:     '💪 身體部位', emotion:  '❤️ 情感類',  action:   '🏃 動作類',
  place:    '📍 地點類',  object:   '📦 物品類',  nature:   '🌊 自然類',
  science:  '🔬 科學類',  art:      '🎨 藝術類',  sport:    '⚽ 運動類',
  person:   '👤 人物類',  time:     '⏰ 時間類',  abstract: '💭 抽象概念',
  color:    '🎨 顏色類',  size:     '📏 尺寸類',  weather:  '⛅ 天氣類',
  music:    '🎵 音樂類',  language: '📝 語言類',  number:   '🔢 數字類',
};

// 用 Datamuse 的語義關聯推斷分類
async function fetchHintData(word){
  const w = word.toLowerCase();
  let category = null;

  // 1. 先試牛津字典 API（有 CEFR 和 lexicalCategory）
  try{
    const r = await sfetch(
      `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(w)}`,
      5000
    );
    if(r){
      const data = await r.json();
      const pos = data?.[0]?.meanings?.[0]?.partOfSpeech;
      const defs = data?.[0]?.meanings?.flatMap(m=>m.definitions.map(d=>d.definition.toLowerCase())) || [];
      const allText = defs.join(' ');

      // 從定義文字推斷分類
      if(/\b(animal|mammal|bird|fish|insect|reptile|species)\b/.test(allText)) category='animal';
      else if(/\b(plant|tree|flower|leaf|root|herb|shrub|grass)\b/.test(allText)) category='plant';
      else if(/\b(food|eat|edible|fruit|vegetable|meal|cook|flavor|taste)\b/.test(allText)) category='food';
      else if(/\b(emotion|feeling|mood|happy|sad|angry|fear|love|joy)\b/.test(allText)) category='emotion';
      else if(/\b(body|muscle|bone|organ|skin|blood|nerve|heart|brain)\b/.test(allText)) category='body';
      else if(/\b(place|location|city|country|region|area|land|geography)\b/.test(allText)) category='place';
      else if(/\b(sport|game|play|compete|athlete|team|race|match)\b/.test(allText)) category='sport';
      else if(/\b(music|song|melody|rhythm|instrument|note|chord)\b/.test(allText)) category='music';
      else if(/\b(science|physics|chemical|biology|experiment|theory)\b/.test(allText)) category='science';
      else if(/\b(art|paint|draw|sculpture|design|creative|aesthetic)\b/.test(allText)) category='art';
      else if(/\b(weather|climate|rain|sun|wind|storm|temperature)\b/.test(allText)) category='weather';
      else if(/\b(move|walk|run|jump|throw|lift|push|pull|act)\b/.test(allText)) category='action';
      else if(pos==='noun') category='object';
      else if(pos==='adjective') category='abstract';
      else if(pos==='verb') category='action';
    }
  }catch(e){}

  // 2. 試 Datamuse 的 `rel_jja`（形容詞關聯）推斷具體vs抽象
  if(!category){
    try{
      const r = await sfetch(`https://api.datamuse.com/words?rel_jjb=${encodeURIComponent(w)}&max=5`, 4000);
      if(r){
        const d = await r.json();
        if(d.length) category = 'object'; // 有形容詞修飾 → 是具體名詞
      }
    }catch(e){}
  }

  return { category };
}

// 渲染提示按鈕（在 kb 下方）
function renderHintButtons(){
  const hm = S.hm;
  if(hm.status !== 'playing') return;
  const hintEl = document.getElementById('hint');
  if(!hintEl) return;

  const catLabel = hm.hint?.category ? CATEGORY_TAGS[hm.hint.category] : null;
  const canUseCat = catLabel && !hm.hintUsed.cat;
  const unrevealedIdx = hm.word.split('').reduce((arr,c,i)=>{
    if(!hm.guessed.has(c) && !hm.hintUsed.letters.includes(i)) arr.push(i);
    return arr;
  }, []);
  const canUseLetter = unrevealedIdx.length > 0;

  // 顯示已用提示資訊
  const usedInfo = [];
  if(hm.hintUsed.cat && catLabel) usedInfo.push(`<span style="color:#f59e0b;font-size:11px">💡 ${catLabel}</span>`);
  hm.hintUsed.letters.forEach(idx => usedInfo.push(`<span style="color:#60a5fa;font-size:11px">🔤 第${idx+1}個字母已提示</span>`));

  const penalty = Math.round(hm.hintPenalty * 100);

  hintEl.innerHTML = `
  <div style="width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 0">
    ${usedInfo.length ? `<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">${usedInfo.join('')}</div>` : ''}
    ${penalty > 0 ? `<div style="font-size:10px;color:var(--danger)">提示扣減：-${penalty}% 卡牌強度</div>` : ''}
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      ${canUseCat ? `<button onclick="useHintCat()" style="background:#f59e0b18;border:1px solid #f59e0b40;color:#f59e0b;font-size:11px;font-weight:700;padding:5px 12px;border-radius:8px;cursor:pointer">
        💡 類型提示 <span style="opacity:.7;font-size:10px">(-30%)</span>
      </button>` : (!hm.hintUsed.cat && !catLabel ? `<button disabled style="background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 12px;border-radius:8px;opacity:.5">
        💡 類型載入中…
      </button>` : '')}
      ${canUseLetter ? `<button onclick="useHintLetter()" style="background:#60a5fa18;border:1px solid #60a5fa40;color:#60a5fa;font-size:11px;font-weight:700;padding:5px 12px;border-radius:8px;cursor:pointer">
        🔤 字母提示 <span style="opacity:.7;font-size:10px">(-15%)</span>
      </button>` : ''}
    </div>
  </div>`;
}

function useHintCat(){
  const hm = S.hm;
  if(hm.hintUsed.cat || !hm.hint?.category) return;
  hm.hintUsed.cat = true;
  hm.hintPenalty = Math.min(1, hm.hintPenalty + 0.30);
  hm.errors = Math.max(hm.errors, 1); // 用提示至少算1次錯
  toast(`類型提示：${CATEGORY_TAGS[hm.hint.category]} （已扣 30% 強度）`, 'info');
  renderHintButtons();
}

function useHintLetter(){
  const hm = S.hm;
  // 找一個未猜到且未提示過的字母位置，優先選中間位置（不要給第一個）
  const unrevIdx = hm.word.split('').reduce((arr,c,i)=>{
    if(!hm.guessed.has(c) && !hm.hintUsed.letters.includes(i)) arr.push(i);
    return arr;
  }, []);
  if(!unrevIdx.length) return;
  // 優先中間位置，避免直接給最後一個
  unrevIdx.sort((a,b)=>Math.abs(a-hm.word.length/2)-Math.abs(b-hm.word.length/2));
  const idx = unrevIdx[0];
  const letter = hm.word[idx];

  hm.hintUsed.letters.push(idx);
  hm.hintPenalty = Math.min(1, hm.hintPenalty + 0.15);
  // 揭示這個字母（相當於猜中它）
  hm.guessed.add(letter);
  // 但不算猜中加分，只靜默加入（不觸發 won 判斷，讓玩家繼續猜）
  toast(`字母提示：第 ${idx+1} 個字母是「${letter}」（已扣 15% 強度）`, 'info');

  // 如果這樣揭示後已全猜完，正常觸發結束
  if(hm.word.split('').every(c=>hm.guessed.has(c))){ endHM('won'); return; }
  renderHM();
  renderHintButtons();
}

function guess(l){
  const hm=S.hm;
  if(hm.status!=='playing' || hm.guessed.has(l)) return;
  hm.guessed.add(l);
  if(!hm.word.includes(l)){
    hm.mistakes++; hm.errors++;
    const g=document.getElementById('gallows');
    g.style.animation='none';
    requestAnimationFrame(()=>{ g.style.animation='shake .35s ease'; });
    if(hm.mistakes>=hm.maxMistakes){ endHM('lost'); return; }
  } else {
    if(hm.word.split('').every(c=>hm.guessed.has(c))){ endHM('won'); return; }
  }
  renderHM();
}

async function endHM(result){
  S.hm.status='saving'; renderHM();
  const wd = await fetchWordData(S.hm.word.toLowerCase());
  S.hm.details = wd;
  if(result==='won'){
    const card = buildCard(wd, S.hm.errors, S.hm.maxMistakes, S.hm.hintPenalty);
    S.cards.unshift(card); S.hm.newCard = card;
    if(!S.unlockedLib){ S.unlockedLib=true; unlockNav(); }
    save(); updHdr();
    if(S.tab!=='library'){
      const b=document.getElementById('nbadge');
      b.style.display='flex';
      b.textContent=S.cards.filter(c=>c.isNew).length;
    }
  }
  S.hm.status=result; renderHM(); renderResult(result);
}

// Fill in the dict-patch-zone after the DOM renders, with extra wiki attempts
async function patchResultDict(wd, result){
  const w = wd?.word || S.hm.word.toLowerCase();

  // Try Wikipedia (EN) as the main fallback for words like "wanderlust"
  let patchText = '';

  // 1. Try English Wiktionary via MediaWiki API
  try{
    const r = await sfetch(`https://en.wiktionary.org/w/api.php?action=query&prop=extracts&exsentences=3&explaintext=1&titles=${encodeURIComponent(w)}&format=json&origin=*`, 5000);
    if(r){
      const d = await r.json();
      const pages = d?.query?.pages;
      const id = pages ? Object.keys(pages)[0] : '-1';
      if(id!=='-1' && pages[id]?.extract && pages[id].extract.length > 30){
        patchText = pages[id].extract.slice(0, 400);
      }
    }
  }catch(e){}

  // 2. If still nothing, try English Wikipedia
  if(!patchText){
    try{
      const r = await sfetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exsentences=3&explaintext=1&titles=${encodeURIComponent(w)}&redirects=1&format=json&origin=*`, 5000);
      if(r){
        const d = await r.json();
        const pages = d?.query?.pages;
        const id = pages ? Object.keys(pages)[0] : '-1';
        if(id!=='-1' && pages[id]?.extract && pages[id].extract.length > 30){
          patchText = pages[id].extract.slice(0, 400);
        }
      }
    }catch(e){}
  }

  // Update wd.explanation and the card if we got something
  if(patchText && wd){ wd.explanation = patchText; }

  // Try one more translation pass if missing
  let patchTr = wd?.translation || '';
  if(!patchTr || /^[a-zA-Z]/.test(patchTr)){
    patchTr = await getTranslation(w);
    if(patchTr && wd) wd.translation = patchTr;
  }

  // Also update the saved card if won
  if(result==='won' && S.hm.newCard){
    if(patchText)  S.hm.newCard.explanation = patchText;
    if(patchTr && !/^[a-zA-Z]/.test(patchTr)) S.hm.newCard.translation = patchTr;
    save();
  }

  // Patch the DOM — update just the dict zone if still visible
  const zone = document.getElementById('dict-patch-zone');
  if(zone){
    if(patchText){
      zone.style.color = 'var(--text)';
      zone.style.lineHeight = '1.75';
      zone.style.fontSize = '13px';
      zone.innerHTML = `<div style="font-size:10px;font-weight:900;letter-spacing:2px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px">${ICO.globe} Wikipedia / Wiktionary</div>${patchText.replace(/\n/g,'<br>')}`;
    } else {
      zone.innerHTML = `<span style="color:var(--muted);font-size:12px">（此單字暫無線上字典資料）</span>`;
    }
  }

  // Also patch translation display if it updated
  const trEl = document.getElementById('result-tr-display');
  if(trEl && patchTr && !/^[a-zA-Z]/.test(patchTr)){
    trEl.textContent = `中文翻譯：${patchTr}`;
  }
}

async function oModal(cid){
  const card = S.cards.find(c=>c.id===cid); if(!card) return;
  document.getElementById('mbg').classList.add('on');

  // Render immediately with what we have
  renderModalContent(card);

  // If card is missing meanings AND explanation — it's an old/incomplete card; refetch now
  const needsRefetch = (!card.meanings || !card.meanings.length) && !card.explanation;
  const hasNoTranslation = !card.translation || /^[a-zA-Z]/.test(card.translation) && card.translation.toLowerCase() === card.wordLower;

  if(needsRefetch || hasNoTranslation){
    // Show loading indicator if no dict data
    const wd = await fetchWordData(card.wordLower || card.word.toLowerCase());
    // Patch the card in-place
    if(wd.meanings?.length)   card.meanings    = wd.meanings;
    if(wd.explanation)        card.explanation  = wd.explanation;
    if(wd.phonetic)           card.phonetic     = wd.phonetic;
    if(wd.translation && !/^[a-zA-Z]/.test(wd.translation)) card.translation = wd.translation;
    if(wd.cefr && card.cefr !== wd.cefr){
      card.cefr  = wd.cefr;
      card.stars = c2s(wd.cefr);
    }
    save();
    // Re-render modal with fresh data (only if still open)
    if(document.getElementById('mbg').classList.contains('on')){
      renderModalContent(card);
    }
  }
}

function startBattle_ai(){
  // AI picks from cards NOT in player's deck (no duplicates)
  const deckIds = new Set(S.ar.deck.map(c=>c.id));
  const pool = [...S.cards].filter(c=>!deckIds.has(c.id)).sort(()=>Math.random()-.5);
  // If not enough unique cards, fill remainder randomly (shouldn't happen with 4+ cards)
  let aiHand = pool.slice(0,4);
  if(aiHand.length < 4){
    const extra = [...S.cards].sort(()=>Math.random()-.5).slice(0, 4-aiHand.length);
    aiHand = [...aiHand, ...extra];
  }
  S.ar.ai={hand:aiHand, used:new Set()};
  S.ar.pl={hand:[...S.ar.deck], used:new Set()};
  S.ar.round=1; S.ar.plW=0; S.ar.aiW=0; S.ar.rr=null;
  S.ar.phase='ai_battle'; S.ar.animating=false;
  renderAI();
}

    </div>

      ${draw?'⚖️ 平局':pw?'✅ 你勝這局！':'❌ 對手勝這局'}
    </div>
  </div>`;
}

function scoreHUD(myW, opW, round){
  return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin-bottom:11px;display:flex;justify-content:space-between;align-items:center">
    <div style="text-align:center"><div style="font-size:10px;color:var(--muted);margin-bottom:2px">你</div><div style="font-size:26px;font-weight:900;color:var(--ok)">${myW}</div></div>
    <div style="text-align:center"><div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:2px">ROUND</div><div style="font-size:20px;font-weight:900">${Math.min(round,3)}/3</div></div>
    <div style="text-align:center"><div style="font-size:10px;color:var(--muted);margin-bottom:2px">對手</div><div style="font-size:26px;font-weight:900;color:var(--danger)">${opW}</div></div>
  </div>`;
}

function gameOverBlock(iWon, myW, opW, stolen, btn1, btn2){
  return `<div style="text-align:center;padding:28px 0 18px">
    <div style="font-size:52px;margin-bottom:6px">${iWon?'🏆':'💀'}</div>
    <div class="ko" style="font-size:30px;color:${iWon?'var(--ok)':'var(--danger)'}">${iWon?'VICTORY!':'DEFEATED'}</div>
    <div style="font-size:13px;color:var(--muted);margin-top:3px">${myW} : ${opW}</div>
  </div>
  ${iWon && stolen ? `<div style="background:var(--bg2);border:1px solid #facc1535;border-radius:14px;padding:14px;text-align:center;margin-bottom:12px">
    <div style="font-size:12px;color:#facc15;font-weight:700;margin-bottom:8px">🎉 搶到了對手的卡牌！</div>
    <div style="width:110px;margin:0 auto" class="cdrop">${cardH(stolen)}</div>
  </div>` : ''}
  <button class="btn btnp" style="width:100%;margin-bottom:8px" onclick="${btn1}">${ICO.refresh} 繼續猜單字</button>
  <button class="btn btns" style="width:100%" onclick="${btn2}">${ICO.back} 返回競技場</button>`;
}

// 卡牌背面 HTML（對手手牌用）
function cardBack(){
  return `<div class="ci" style="background:linear-gradient(135deg,#1a1a3e,#0f0f2a);border-color:#3a3a6a">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;opacity:.4">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="3"/></svg>
    </div>
    <div style="font-size:9px;color:#3a3a6a;text-align:center;font-weight:700;padding-bottom:4px">???</div>
  </div>`;
}

function renderAI(){
  const ar=S.ar, pw=ar.plW, aw=ar.aiW, r=ar.round;
  if(pw>=2||aw>=2||r>3){
    aIn().innerHTML = gameOverBlock(pw>aw, pw, aw, ar.rr?.stolen, "startHM();goTab('hangman')", "aBack()");
    return;
  }
  const isAnimating = ar.animating;
  const hH = ar.pl.hand.map((c,i)=>{
    const u=ar.pl.used.has(i);
    return `<div class="hcard ${u?'used':''}" onclick="if(!${u}&&!${isAnimating})playAI(${i})">${cardH(c,true)}</div>`;
  }).join('');
  aIn().innerHTML=`
  ${scoreHUD(pw, aw, r)}
  ${ar.rr ? rrBlock({...ar.rr, opC:ar.rr.aiC}, '你', 'AI') : ''}
  <div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:10px;${isAnimating?'opacity:.5;pointer-events:none':''}">
    <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:7px">${isAnimating?'交鋒中…':'選擇出戰卡牌（點擊出牌）'}</div>
    <div class="hand-row">${hH}</div>
  </div>
  <div style="font-size:11px;color:var(--muted);text-align:center;display:flex;align-items:center;justify-content:center;gap:4px">
    ${ICO.info} ATK 互相攻擊，剩餘 HP 高的獲勝
  </div>`;
}

function playAI(idx){
  const ar=S.ar; if(ar.pl.used.has(idx)||ar.animating) return;
  const plC=ar.pl.hand[idx];
  const avail=[...ar.ai.hand.keys()].filter(i=>!ar.ai.used.has(i));
  if(!avail.length) return;
  const aiIdx=avail[~~(Math.random()*avail.length)];
  const aiC=ar.ai.hand[aiIdx];
  ar.pl.used.add(idx); ar.ai.used.add(aiIdx);
  ar.animating=true; renderAI(); // show locked state

  setTimeout(()=>{
    const plDmg=aiC.atk, opDmg=plC.atk;
    const plR=plC.hp-plDmg, opR=aiC.hp-opDmg;
    const pw=plR>opR, draw=plR===opR;
    if(pw) ar.plW++; else if(!draw) ar.aiW++;
    const rr={round:ar.round, plC, aiC, opC:aiC, plDmg, opDmg, plR, opR, stolen:null};
    ar.round++; ar.animating=false;
    const over=ar.plW>=2||ar.aiW>=2||ar.round>4;
    if(over && ar.plW>ar.aiW){
      // Steal from AI's unused cards only
      const unused=[...ar.ai.hand.keys()].filter(i=>!ar.ai.used.has(i));
      const pool=unused.length?unused.map(i=>ar.ai.hand[i]):ar.ai.hand;
      const s=pool[~~(Math.random()*pool.length)];
      if(s){ const nc={...s,id:`stolen_${Date.now()}`,createdAt:Date.now(),isNew:true}; S.cards.unshift(nc); save(); updHdr(); rr.stolen=nc; }
    }
    ar.rr=rr; renderAI();
  }, 900); // 0.9s delay for animation
}

// ════════════════════════════════
// NETWORK BATTLE (PeerJS)
// ════════════════════════════════
function startBattle_net(){ S.ar.phase='net_lobby'; renderNetLobby(); }

function renderNetLobby(){
  aIn().innerHTML=`
  <div style="text-align:center;padding:12px 0 10px">
    <div style="font-size:14px;font-weight:800;margin-bottom:3px">連線對戰</div>
    <div style="font-size:11px;color:var(--muted)">PeerJS P2P · 零設定</div>
  </div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px">
    <div style="font-size:12px;font-weight:800;margin-bottom:9px;color:var(--accent);display:flex;align-items:center;gap:5px">${ICO.door} 建立房間</div>
    <button class="btn btnp" style="width:100%" id="btn-host" onclick="netHost()">建立並生成房間碼</button>
    <div id="host-area" style="display:none;margin-top:12px;text-align:center">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px">分享房間碼給朋友</div>
      <div id="rcode-disp" class="rcode"></div>
      <button onclick="copyCode()" class="btn btns" style="margin-top:7px;font-size:12px;padding:7px 12px">${ICO.copy} 複製</button>
      <div id="host-st" style="font-size:12px;color:var(--muted);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px">
        ${ICO.spin} 等待對手連線…
      </div>
    </div>
  </div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px">
    <div style="font-size:12px;font-weight:800;margin-bottom:9px;color:var(--accent2);display:flex;align-items:center;gap:5px">${ICO.enter} 加入房間</div>
    <input type="text" class="rinput" id="jin" placeholder="輸入房間碼" maxlength="6">
    <button class="btn" style="width:100%;margin-top:9px;background:var(--accent2);color:#fff;font-size:14px" onclick="netJoin()">加入</button>
    <div id="join-st" style="font-size:12px;color:var(--muted);text-align:center;margin-top:7px;min-height:16px"></div>
  </div>`;
}

function copyCode(){ if(S.ar.roomCode) navigator.clipboard.writeText(S.ar.roomCode).then(()=>toast('已複製！','ok')); }

function netHost(){
  const btn=document.getElementById('btn-host');
  btn.disabled=true; btn.innerHTML=`${ICO.spin} 建立中…`;
  const code=Math.random().toString(36).substring(2,8).toUpperCase();
  S.ar.roomCode=code; S.ar.isHost=true;
  let peer;
  try{ peer=new Peer(code); }catch(e){ peer=new Peer(); }
  S.ar.peer=peer;
  peer.on('open',()=>{
    const ha=document.getElementById('host-area');
    const rd=document.getElementById('rcode-disp');
    if(ha) ha.style.display='block';
    if(rd) rd.textContent=code;
  });
  peer.on('connection',conn=>{
    S.ar.conn=conn; setupConn(conn);
    const hs=document.getElementById('host-st');
    if(hs) hs.innerHTML=`<span style="color:var(--ok)">${ICO.check} 對手已連線，等待牌組交換…</span>`;
    // Host sends deck — waits for opponent's deck via handleNet('start') before starting
    setTimeout(()=>{ conn.send({type:'start',deck:S.ar.deck}); },300);
    // Host will start battle when it receives opponent's 'start' message (in handleNet)
  });
  peer.on('error',e=>{ toast('建立房間失敗：'+e.type,'error'); });
}

function netJoin(){
  const code=document.getElementById('jin').value.toUpperCase().trim();
  if(code.length<4){ toast('請輸入正確房間碼','error'); return; }
  const stEl=document.getElementById('join-st');
  if(stEl) stEl.innerHTML=`<span style="display:flex;align-items:center;gap:5px;justify-content:center">${ICO.spin} 連線中…</span>`;
  S.ar.roomCode=code; S.ar.isHost=false;
  const peer=new Peer(); S.ar.peer=peer;
  peer.on('open',()=>{
    const conn=peer.connect(code); S.ar.conn=conn; setupConn(conn);
    conn.on('open',()=>{
      if(stEl) stEl.innerHTML=`<span style="color:var(--ok);display:flex;align-items:center;gap:5px;justify-content:center">${ICO.check} 已連線，交換牌組中…</span>`;
      conn.send({type:'start',deck:S.ar.deck});
    });
  });
  peer.on('error',()=>{
    if(stEl) stEl.innerHTML=`<span style="color:var(--danger)">無法連線，請確認房間碼</span>`;
  });
}

function setupConn(conn){
  conn.on('data', d=>handleNet(d));
  conn.on('close',()=>{ toast('對手斷線','error'); S.ar.phase='mode'; renderAMode(); });
}

function handleNet(data){
  if(data.type==='start'){
    // Both sides receive each other's deck via this message, then start
    S.ar.no={hand:data.deck, used:new Set(), wins:0, sel:null, ready:false};
    S.ar.np={hand:[...S.ar.deck], used:new Set(), wins:0, sel:null};
    S.ar.netRound=1; S.ar.netRR=null; S.ar.netAnimating=false;
    S.ar.phase='net_battle';
    renderNet();
  }
  if(data.type==='play'){
    S.ar.no.sel=data.idx; S.ar.no.ready=true;
    if(S.ar.np.sel!==null) resolveNet(); // both played, resolve now
    else renderNet(); // just show opponent is ready
  }
  if(data.type==='stolen'){ toast(`對手搶走了你的 ${data.word}！`,'error'); }
}

function renderNet(){
  const ar=S.ar, np=ar.np, no=ar.no, r=ar.netRound;
  if(np.wins>=2||no.wins>=2||r>3){
    aIn().innerHTML = gameOverBlock(np.wins>no.wins, np.wins, no.wins, ar.netRR?.stolen, "startHM();goTab('hangman')", "aBack()");
    return;
  }
  const isAnim = ar.netAnimating;
  const opReady = no.ready; // opponent has played

  // My hand — show cards face-up, used ones greyed
  const myHandH = np.hand.map((c,i)=>{
    const u=np.used.has(i), sel=np.sel===i;
    return `<div class="hcard ${u?'used':''} ${sel?'sel':''}" onclick="playNet(${i})">${cardH(c,true)}</div>`;
  }).join('');

  // Opponent's hand — always face-down (backside), used ones gone
  const opHandH = no.hand.map((_,i)=>{
    if(no.used.has(i)) return ''; // used cards disappear
    const isSelected = no.sel===i && isAnim; // only reveal during resolve
    return `<div class="hcard" style="cursor:default">${isSelected ? cardH(no.hand[i],true) : cardBack()}</div>`;
  }).join('');

  const statusMsg = isAnim
    ? `<div style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted);padding:6px 0">${ICO.spin} 交鋒中…</div>`
    : np.sel!==null && !opReady
    ? `<div style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted);padding:6px 0">${ICO.spin} 等待對手出牌…</div>`
    : opReady && np.sel===null
    ? `<div style="font-size:12px;color:#fbbf24;font-weight:700;text-align:center;padding:6px 0">對手已出牌，請選擇你的卡牌！</div>`
    : '';

  aIn().innerHTML=`
  ${scoreHUD(np.wins, no.wins, r)}
  ${ar.netRR ? rrBlock({...ar.netRR}, '你', '對手') : ''}

  <!-- Opponent hand (face down) -->
  <div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px">
    <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:5px">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      對手手牌 ${opReady ? '<span style="color:#fbbf24;font-size:10px">（已出牌）</span>' : ''}
    </div>
    <div class="hand-row" style="opacity:${isAnim?.6:1}">${opHandH}</div>
  </div>

  <!-- My hand -->
  <div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px;${isAnim?'opacity:.5;pointer-events:none':''}">
    <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:7px">
      ${np.sel===null ? '選擇出戰卡牌' : `已選：${np.hand[np.sel]?.word}`}
    </div>
    <div class="hand-row">${myHandH}</div>
  </div>

  ${statusMsg}
  <div style="font-size:11px;color:var(--muted);text-align:center;display:flex;align-items:center;justify-content:center;gap:4px;margin-top:4px">
    ${ICO.wifi} 房間碼：<strong style="color:var(--accent2)">${S.ar.roomCode}</strong>
  </div>`;
}

function playNet(idx){
  const np=S.ar.np; if(np.used.has(idx)||np.sel!==null||S.ar.netAnimating) return;
  np.sel=idx;
  S.ar.conn?.send({type:'play',idx});
  if(S.ar.no.ready) resolveNet();
  else renderNet();
}

function resolveNet(){
  const ar=S.ar, np=ar.np, no=ar.no;
  if(np.sel===null||!no.ready||ar.netAnimating) return;
  ar.netAnimating=true; renderNet();

  setTimeout(()=>{
    const plC=np.hand[np.sel], opC=no.hand[no.sel];
    if(!plC||!opC){ ar.netAnimating=false; return; }
    const plDmg=opC.atk, opDmg=plC.atk;
    const plR=plC.hp-plDmg, opR=opC.hp-opDmg;
    const pw=plR>opR, draw=plR===opR;
    np.used.add(np.sel); no.used.add(no.sel);
    if(pw) np.wins++; else if(!draw) no.wins++;
    const rr={round:ar.netRound, plC, opC, plDmg, opDmg, plR, opR, stolen:null};
    ar.netRound++;
    const pSel=np.sel; np.sel=null; no.ready=false; no.sel=null; ar.netAnimating=false;
    const over=np.wins>=2||no.wins>=2||ar.netRound>4;
    if(over && np.wins>no.wins){
      const pool=[...no.used].map(i=>no.hand[i]).filter(Boolean);
      const st=(pool.length?pool:no.hand)[~~(Math.random()*(pool.length||no.hand.length))];
      if(st){ const nc={...st,id:`ns_${Date.now()}`,createdAt:Date.now(),isNew:true}; S.cards.unshift(nc); save(); updHdr(); rr.stolen=nc; ar.conn?.send({type:'stolen',word:st.word}); }
    }
    if(over && no.wins>np.wins){
      const lost=np.hand[pSel];
      if(lost){ S.cards=S.cards.filter(c=>c.id!==lost.id); save(); updHdr(); }
    }
    ar.netRR=rr; renderNet();
  }, 900);
}

// KEYBOARD
// ════════════════════════════════
document.addEventListener('keydown',e=>{
  if(S.tab!=='hangman') return;
  if(S.hm.status==='playing' && /^[a-zA-Z]$/.test(e.key)) guess(e.key.toUpperCase());
  if((S.hm.status==='won'||S.hm.status==='lost') && e.key==='Enter') startHM();
});

// INIT

// Inject shake animation
const _st=document.createElement('style');
_st.textContent='@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}';
document.head.appendChild(_st);

  if(S.unlockedLib) document.getElementById('nb-library').classList.remove('lk');
  if(S.cards.length>=4) document.getElementById('nb-arena').classList.remove('lk');
  setTimeout(()=>{
    const sp=document.getElementById('splash');
    sp.style.opacity='0';
    setTimeout(()=>sp.remove(), 400);
  }, 500);
  startHM();
}
init();
